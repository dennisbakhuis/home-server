##########################

##############
## networks ##
##############
networks:
  t2_proxy:
    external: true
  hermes-net:
    driver: bridge


#############
## Volumes ##
#############
volumes:
  teslamate-grafana-data:
  teslamate-app-data:


##############
## services ##
##############
services:

  #############
  ## traefik ##
  #############
  traefik:
    container_name: traefik
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --global.checkNewVersion=true
      - --global.sendAnonymousUsage=false
      - --entrypoints.ssh-forgejo.address=:2222
      - --entryPoints.https.address=:443
      # Allow these IPs to set the X-Forwarded-* headers - Cloudflare IPs: https://www.cloudflare.com/ips/
      - --api.dashboard=true
      - --log=true
      - --log.level=WARN # (Default: error) DEBUG, INFO, WARN, ERROR, FATAL, PANIC
      - --accessLog=true
      - --accessLog.filePath=/traefik_log/traefik.log
      - --accessLog.bufferingSize=100
      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=t2_proxy
      - --providers.file.directory=/rules
      - --providers.file.watch=true
      # Add letsencrypt as default certresolver for all services. Also enables TLS and no need to specify on individual services
      - --entrypoints.https.http.tls.certresolver=letsencrypt
      - --entrypoints.https.http.tls.domains[0].main=$DOMAINNAME
      - --entrypoints.https.http.tls.domains[0].sans=*.$DOMAINNAME
      # - --certificatesResolvers.letsencrypt.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory # LetsEncrypt Staging Server - uncomment when testing
      - --certificatesResolvers.letsencrypt.acme.email=$LETSENCRYPT_EMAIL
      - --certificatesResolvers.letsencrypt.acme.storage=/acme.json
      - --certificatesResolvers.letsencrypt.acme.dnsChallenge.provider=hetzner
      - --certificatesResolvers.letsencrypt.acme.dnsChallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesResolvers.letsencrypt.acme.dnsChallenge.propagation.delayBeforeChecks=90 # To delay DNS check and reduce LE hitrate
    networks:
      t2_proxy:
        ipv4_address: $TRAEFIKIP
    ports:
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - 2222:2222
    volumes:
      - $DOCKERDIR/traefik/rules:/rules
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - $DOCKERDIR/traefik/acme/acme.json:/acme.json
      - $DOCKERDIR/traefik/logs:/traefik_log
      - $DOCKERDIR/shared:/shared
    environment:
      - HETZNER_API_TOKEN=$HETZNER_API_TOKEN
      - TZ=$TZ
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-rtr.entrypoints=https"
      - "traefik.http.routers.traefik-rtr.rule=Host(`traefik.$DOMAINNAME`)"
      - "traefik.http.routers.traefik-rtr.tls=true"
      # - "traefik.http.routers.traefik-rtr.tls.certresolver=letsencrypt" # Comment out this line after first run of traefik to force the use of wildcard certs
      - "traefik.http.routers.traefik-rtr.tls.domains[0].main=$DOMAINNAME"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].sans=*.$DOMAINNAME"
      - "traefik.http.routers.traefik-rtr.service=api@internal"
      - "traefik.http.routers.traefik-rtr.middlewares=chain-white-list@file"

  #######################
  ## mosquitto-eclipse ##
  #######################
  # mosquitto:
  #   image: eclipse-mosquitto:latest
  #   container_name: mosquitto
  #   network_mode: host
  #   restart: unless-stopped
  #   volumes:
  #     # not using persistence
  #     - $DOCKERDIR/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
  #     - $DOCKERDIR/secrets/mosquitto.passwd:/mosquitto/config/mosquitto.passwd
  #     - /etc/localtime:/etc/localtime:ro
  #

  ####################
  ## home-assistant ##
  ####################
  # home-assistant is added using yaml files to traefik
  homeassistant:
    container_name: home-assistant
    image: homeassistant/home-assistant:latest
    volumes:
      - $DOCKERDIR/homeassistant/config:/config
      - $DOCKERDIR/secrets.yaml:/config/secrets.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    network_mode: host
    devices:
      - /dev/ttyUSB0 # DSMR
    labels:
      - "traefik.enable=false"

  ##############
  ## node-red ##
  ##############
  node-red:
    container_name: node-red
    image: nodered/node-red:latest
    volumes:
      - $DOCKERDIR/node_red:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - t2_proxy
    ports:
      - '1880:1880'
    environment:
      - TZ=$TZ
    user: "$PUID:$PGID"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nodered-rtr.entrypoints=https"
      - "traefik.http.routers.nodered-rtr.rule=Host(`nodered.$DOMAINNAME`)"
      - "traefik.http.routers.nodered-rtr.middlewares=chain-white-list@file"
      - "traefik.http.routers.nodered-rtr.service=nodered-svc"
      - "traefik.http.services.nodered-svc.loadbalancer.server.port=1880"

  ###############################
  ## growatt monitoring: grott ##
  ###############################
  grott:
    image: ledidobe/grott:master
    container_name: grott
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=$TZ
      - ginvtype=tl3
      - gmqttip=$MQTT_IP
      - gmqttauth=True
      - gmqttuser=$MQTT_USER
      - gmqttpassword=$MQTT_PASSWORD
      - gpvoutput=True
      - gpvapikey=$PVORG_API_KEY
      - gpvsystemid=$PVORG_SYSTEM_ID
      - gblockcmd=True
      - gmqttretain=True

  ##############
